version: '3.8'

services:
  # RabbitMQ Message Broker
  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"    # AMQP port
      - "15672:15672"  # Management UI
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - image_processing_network

  # FastAPI Application
  api:
    build:
      context: .
      dockerfile: docker/fastapi/Dockerfile
    container_name: fastapi_api
    environment:
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: guest
      RABBITMQ_PASSWORD: guest
      DEBUG: "True"
      LOG_LEVEL: INFO
    ports:
      - "8000:8000"
    depends_on:
      rabbitmq:
        condition: service_healthy
    volumes:
      - ./uploads:/app/uploads
      - ./app:/app/app
    networks:
      - image_processing_network
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # Resize Worker 1
  resize_worker_1:
    build:
      context: .
      dockerfile: docker/workers/Dockerfile
    container_name: resize_worker_1
    environment:
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: guest
      RABBITMQ_PASSWORD: guest
      LOG_LEVEL: INFO
    depends_on:
      rabbitmq:
        condition: service_healthy
    volumes:
      - ./app:/app/app
    networks:
      - image_processing_network
    command: python app/modules/resize/worker.py

  # Resize Worker 2 (competing consumer)
  resize_worker_2:
    build:
      context: .
      dockerfile: docker/workers/Dockerfile
    container_name: resize_worker_2
    environment:
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: guest
      RABBITMQ_PASSWORD: guest
      LOG_LEVEL: INFO
    depends_on:
      rabbitmq:
        condition: service_healthy
    volumes:
      - ./app:/app/app
    networks:
      - image_processing_network
    command: python app/modules/resize/worker.py

  # Thumbnail Worker
  thumbnail_worker:
    build:
      context: .
      dockerfile: docker/workers/Dockerfile
    container_name: thumbnail_worker
    environment:
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: guest
      RABBITMQ_PASSWORD: guest
      LOG_LEVEL: INFO
    depends_on:
      rabbitmq:
        condition: service_healthy
    volumes:
      - ./app:/app/app
    networks:
      - image_processing_network
    command: python app/modules/thumbnail/worker.py

  # OCR Worker
  ocr_worker:
    build:
      context: .
      dockerfile: docker/workers/Dockerfile
    container_name: ocr_worker
    environment:
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: guest
      RABBITMQ_PASSWORD: guest
      LOG_LEVEL: INFO
    depends_on:
      rabbitmq:
        condition: service_healthy
    volumes:
      - ./app:/app/app
    networks:
      - image_processing_network
    command: python app/modules/ocr/worker.py

  # AI Tagging Worker
  ai_tagging_worker:
    build:
      context: .
      dockerfile: docker/workers/Dockerfile
    container_name: ai_tagging_worker
    environment:
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: guest
      RABBITMQ_PASSWORD: guest
      LOG_LEVEL: INFO
    depends_on:
      rabbitmq:
        condition: service_healthy
    volumes:
      - ./app:/app/app
    networks:
      - image_processing_network
    command: python app/modules/ai_tagging/worker.py

  # Retry Worker
  retry_worker:
    build:
      context: .
      dockerfile: docker/workers/Dockerfile
    container_name: retry_worker
    environment:
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: guest
      RABBITMQ_PASSWORD: guest
      LOG_LEVEL: INFO
    depends_on:
      rabbitmq:
        condition: service_healthy
    volumes:
      - ./app:/app/app
    networks:
      - image_processing_network
    command: python app/modules/retry/worker.py

  # Dead Letter Queue Worker
  dlq_worker:
    build:
      context: .
      dockerfile: docker/workers/Dockerfile
    container_name: dlq_worker
    environment:
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: guest
      RABBITMQ_PASSWORD: guest
      LOG_LEVEL: INFO
    depends_on:
      rabbitmq:
        condition: service_healthy
    volumes:
      - ./app:/app/app
    networks:
      - image_processing_network
    command: python app/modules/dead_letter/worker.py

  # Logging System Worker
  logging_worker:
    build:
      context: .
      dockerfile: docker/workers/Dockerfile
    container_name: logging_worker
    environment:
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: guest
      RABBITMQ_PASSWORD: guest
      LOG_LEVEL: INFO
    depends_on:
      rabbitmq:
        condition: service_healthy
    volumes:
      - ./app:/app/app
    networks:
      - image_processing_network
    command: python app/modules/logging_system/worker.py

networks:
  image_processing_network:
    driver: bridge

volumes:
  rabbitmq_data:
